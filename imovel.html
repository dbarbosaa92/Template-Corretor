<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imóvel | Thiago Bastos</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="shortcut icon" href="/favicon/favicon.ico" type="image/x-icon">
</head>
<body>

<!-- Custom Cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html#sobre" onclick="closeMobile()">Sobre</a>
  <a href="index.html#imoveis" onclick="closeMobile()">Imóveis</a>
  <a href="index.html#contato" onclick="closeMobile()">Contato</a>
</div>

<!-- NAVBAR -->
<nav id="navbar">
  <a href="index.html" class="nav-logo">Thiago <span>Bastos</span></a>
  <ul class="nav-links">
    <li><a href="index.html#sobre">Sobre</a></li>
    <li><a href="index.html#imoveis">Imóveis</a></li>
    <li><a href="index.html#contato">Contato</a></li>
  </ul>
  <a href="index.html#contato" class="nav-cta">Agendar Visita</a>
  <button class="hamburger" onclick="toggleMobile()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- HERO -->
<section class="detalhe-hero">
  <div class="detalhe-hero-img-wrap">
    <img id="detalheImg" src="" alt="">
    <div class="detalhe-hero-overlay"></div>
  </div>

  <a href="index.html#imoveis" class="detalhe-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Voltar ao portfólio
  </a>

  <div class="galeria-counter" id="galeriaContador"></div>

  <button class="galeria-btn galeria-prev" id="galeriaAnterior" aria-label="Foto anterior">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
  </button>
  <button class="galeria-btn galeria-next" id="galeriaSeguinte" aria-label="Próxima foto">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>

  <div class="detalhe-hero-info">
    <span class="imovel-badge" id="detalheBadge"></span>
    <h1 class="detalhe-titulo" id="detalheNome"></h1>
    <p class="detalhe-loc">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span id="detalheLoc"></span>
    </p>
    <div class="detalhe-preco" id="detalhePreco"></div>
  </div>
</section>

<!-- THUMBNAILS -->
<div class="galeria-strip" id="galeriaStrip"></div>

<!-- CONTENT -->
<section class="detalhe-content">
  <div class="detalhe-grid">

    <!-- Coluna esquerda -->
    <div class="detalhe-left">

      <div class="detalhe-section">
        <div class="section-eyebrow">Sobre o imóvel</div>
        <span class="ornament" style="text-align:left; display:block; margin:0.3rem 0;">— ✦ —</span>
        <p class="detalhe-descricao" id="detalheDescricao"></p>
      </div>

      <div class="detalhe-stats" id="detalheStats"></div>

      <div class="detalhe-section">
        <div class="section-eyebrow">Características</div>
        <span class="ornament" style="text-align:left; display:block; margin:0.3rem 0;">— ✦ —</span>
        <ul class="detalhe-features" id="detalheFeatures"></ul>
      </div>

    </div>

    <!-- Coluna direita -->
    <div class="detalhe-right">
      <div class="detalhe-card">
        <div class="detalhe-card-preco" id="detalheCardPreco"></div>
        <div class="detalhe-card-area" id="detalheCardArea"></div>
        <div class="detalhe-card-divider"></div>
        <a id="detalheWhatsapp" href="#" class="detalhe-cta-primary" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Falar com corretor
        </a>
        <a href="index.html#contato" class="detalhe-cta-secondary">
          Agendar visita
        </a>
      </div>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer class="detalhe-footer">
  <a href="index.html#imoveis" class="detalhe-footer-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Ver outros imóveis
  </a>
  <p class="detalhe-footer-copy">© 2026 Thiago Bastos Imóveis · Todos os direitos reservados</p>
</footer>

<script src="properties.js"></script>
<script src="imovel.js"></script>
</body>
</html>
